<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>安装薪薪汪 Codex 宠物</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; background: #fff8eb; color: #4d3930; }
    main { width: min(520px, calc(100% - 40px)); padding: 34px; border: 1px solid #efd4aa; border-radius: 28px; background: white; text-align: center; box-shadow: 0 18px 55px #9f795329; }
    img { width: 150px; height: 162px; object-fit: cover; object-position: left top; border-radius: 22px; background: #f7ead4; }
    button { border: 0; border-radius: 18px; padding: 14px 24px; background: #70c5a4; color: white; font-size: 18px; font-weight: 700; cursor: pointer; }
    p { line-height: 1.7; color: #80695d; }
  </style>
</head>
<body>
  <main>
    <img src="xinxin-native-sprite-v2.png" alt="薪薪汪" />
    <h1>薪薪汪 Codex 原生宠物</h1>
    <p>点击后将打开 Codex/ChatGPT 官方宠物安装确认页。</p>
    <button id="install">一键安装薪薪汪</button>
  </main>
  <script>
    document.getElementById("install").addEventListener("click", () => {
      const imageUrl = new URL("xinxin-native-sprite-v2.png", location.href).href;
      const query = new URLSearchParams({
        name: "薪薪汪",
        description: "会陪你写代码、等待任务、检查结果的边牧打工搭子。",
        imageUrl,
        spriteVersionNumber: "2"
      });
      location.href = `codex://pets/install?${query}`;
    });
  </script>
</body>
</html>
